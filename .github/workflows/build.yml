name: Build & Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: cr.selcloud.ru
          username: ${{ secrets.SELCLOUD_REGISTRY_USER }}
          password: ${{ secrets.SELCLOUD_REGISTRY_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: cr.selcloud.ru/frontend/nuxt:latest
          cache-from: type=registry,ref=cr.selcloud.ru/frontend/nuxt:buildcache
          cache-to: type=registry,ref=cr.selcloud.ru/frontend/nuxt:buildcache,mode=max
